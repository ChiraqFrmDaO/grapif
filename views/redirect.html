<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Even geduld...</title>
  <style>
    body { background:#0f0f0f; color:white; font-family:Arial, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .loader { border:5px solid #333; border-top:5px solid #00ff88; border-radius:50%; width:60px; height:60px; animation:spin 1s linear infinite; margin:20px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status { font-size: 0.95rem; opacity: 0.8; margin-top: 10px; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <div class="loader"></div>
    <h2>Even geduld...</h2>
    <p class="status" id="status">Bezig met doorsturen...</p>
  </div>

  <script>
    const trackerId = window.location.pathname.split('/').pop();
    const statusEl = document.getElementById('status');

    // Geo ophalen + doorsturen
    async function init() {
      try {
        const geoRes = await fetch('https://ipapi.co/json/');
        if (geoRes.ok) {
          const data = await geoRes.json();
          await fetch('/api/log-geo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              tracker_id: trackerId,
              ip: data.ip,
              country: data.country_name,
              city: data.city,
              isp: data.org
            })
          });
          statusEl.textContent = "✅ Informatie opgeslagen";
        }
      } catch (err) {
        console.log("Geo mislukt, fallback...");
        statusEl.textContent = "Bezig met doorsturen...";
      }

      // Redirect altijd uitvoeren (na 1.6 seconde)
      setTimeout(() => {
        window.location.href = "{{DESTINATION_URL}}";
      }, 1600);
    }

    init();
  </script>
</body>
</html>
