<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝐑𝟑𝐃𝐈𝐑𝟑𝐂𝐓 - Redirecting...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #090917;
      color: #fff;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtiele achtergrondanimatie */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      background: radial-gradient(ellipse at 30% 40%, rgba(0,255,136,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 60%, rgba(0,204,255,0.06) 0%, transparent 60%);
      animation: pulse 6s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes pulse {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.04); }
    }

    .card {
      position: relative;
      max-width: 460px;
      width: calc(100% - 32px);
      padding: 36px 32px;
      border-radius: 24px;
      background: rgba(10, 10, 30, 0.96);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 32px 80px rgba(0,0,0,0.5);
      text-align: center;
      animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #00ff88;
      margin-bottom: 24px;
      opacity: 0.9;
    }

    .countdown-ring {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 20px;
    }

    .countdown-ring svg {
      transform: rotate(-90deg);
    }

    .countdown-ring circle {
      fill: none;
      stroke-width: 4;
    }

    .countdown-ring .track {
      stroke: rgba(255,255,255,0.08);
    }

    .countdown-ring .progress {
      stroke: #00ccff;
      stroke-linecap: round;
      stroke-dasharray: 251.2;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .countdown-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 700;
      color: #00ccff;
    }

    .message {
      font-size: 1rem;
      opacity: 0.75;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .destination {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      word-break: break-all;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-top: 8px;
    }

    .status {
      margin-top: 18px;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body data-destination-url="{{DESTINATION_URL}}" data-tracker-id="{{TRACKER_ID}}">
  <div class="card">
    <div class="logo">R3DIR3CT</div>

    <div class="countdown-ring">
      <svg viewBox="0 0 96 96" width="96" height="96">
        <circle class="track"    cx="48" cy="48" r="40"/>
        <circle class="progress" cx="48" cy="48" r="40" id="progressRing"/>
      </svg>
      <div class="countdown-number" id="countdown">3</div>
    </div>

    <p class="message">You are being redirected.</p>
    <div class="destination" id="targetLink"></div>
    <p class="status" id="status">Please wait…</p>
  </div>

  <script>
    // Waarden worden door de server veilig in data-attributen geplaatst
    const targetUrl = document.body.dataset.destinationUrl;
    const trackerId = document.body.dataset.trackerId;

    // Toon de bestemmings-URL op een veilige manier via textContent
    document.getElementById('targetLink').textContent = targetUrl;

    // SVG-cirkel animatie
    const circumference = 2 * Math.PI * 40; // ≈ 251.2
    const ring = document.getElementById('progressRing');
    ring.style.strokeDasharray  = circumference;
    ring.style.strokeDashoffset = 0;

    async function fetchGeo() {
      try {
        const response = await fetch('https://ipapi.co/json/', {
          cache: 'no-store'
        });

        if (!response.ok) {
          throw new Error(`Geo failed: ${response.status}`);
        }

        const data = await response.json();

        return {
          ip: data.ip || null,
          country: data.country_name || null,
          city: data.city || null,
          isp: data.org || null,
          lat: data.latitude || null,
          lon: data.longitude || null
        };

      } catch (err) {
        console.error("Geo error:", err);

        return {
          ip: null,
          country: null,
          city: null,
          isp: null,
          lat: null,
          lon: null
        };
      }
    }

    async function sendLog() {
      const geo = await fetchGeo();
      const payload = { tracker_id: trackerId, ...geo };

      try {
        await fetch('/api/log-geo', {
          method:  'POST',
          credentials: 'same-origin',
          keepalive: true,
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });
      } catch (err) {
        console.warn('Log naar server mislukt met fetch:', err);
        if (navigator.sendBeacon) {
          navigator.sendBeacon('/api/log-geo', new Blob([JSON.stringify(payload)], { type: 'application/json' }));
        }
      }
    }

    async function beginRedirect() {
      sendLog().catch(console.error);


      let countdown = 3;
      const countdownEl = document.getElementById('countdown');
      const statusEl    = document.getElementById('status');
      const totalMs     = countdown * 1000;
      const startTime   = Date.now();

      const timer = setInterval(() => {
        const elapsed  = Date.now() - startTime;
        const fraction = Math.min(elapsed / totalMs, 1);
        ring.style.strokeDashoffset = circumference * fraction;

        countdown = Math.ceil(3 - elapsed / 1000);

        if (elapsed >= totalMs) {
          clearInterval(timer);
          countdownEl.textContent   = '0';
          statusEl.textContent      = 'Doorsturen…';
          ring.style.strokeDashoffset = circumference;
          window.location.replace(targetUrl);
          return;
        }

        countdownEl.textContent = countdown;
        statusEl.textContent    = `Doorsturen in ${countdown}…`;
      }, 200);
    }

    beginRedirect();
  </script>
</body>
</html>
