<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>IP Logger Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1e1e1e; color: #eee; margin: 20px; }
    h1 { color: #00ff88; }
    input, button { padding: 10px; margin: 8px 0; border-radius: 5px; }
    button { background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
    .link { background: #333; padding: 10px; word-break: break-all; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🔥 IP Logger Dashboard</h1>

  <h2>Nieuwe Tracking Link Aanmaken</h2>
  <input type="text" id="name" placeholder="Naam van de link (bijv. TikTok)" style="width:300px;">
  <input type="text" id="destination" placeholder="Doel URL[](https://...)" style="width:500px;">
  <button onclick="generateLink()">Link Aanmaken</button>

  <div id="result"></div>

  <hr>
  <h2>Laatste Logs</h2>
  <table id="logsTable" border="1" style="width:100%; border-collapse: collapse;">
    <thead>
      <tr><th>Tijd</th><th>Tracker</th><th>IP</th><th>Land</th><th>Stad</th><th>Browser/OS</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function generateLink() {
      const name = document.getElementById('name').value.trim();
      const dest = document.getElementById('destination').value.trim();

      if (!name || !dest) {
        alert("Vul beide velden in!");
        return;
      }

      const trackerId = Math.random().toString(36).substring(2, 15);
      const fullLink = `https://${window.location.hostname}/track/${trackerId}`;

      document.getElementById('result').innerHTML = `
        <p><strong>Link aangemaakt!</strong></p>
        <div class="link">${fullLink}</div>
        <button onclick="copyLink('${fullLink}')">Kopiëren</button>
        <p><small>Bestemming: ${dest}</small></p>
      `;

      alert(`Link aangemaakt!\n\n${fullLink}\n\nJe kan hem nu gebruiken.`);
    }

    function copyLink(link) {
      navigator.clipboard.writeText(link);
      alert("Link gekopieerd!");
    }

    // Logs laden
    fetch('/api/logs')
      .then(res => res.json())
      .then(logs => {
        const tbody = document.querySelector('#logsTable tbody');
        tbody.innerHTML = '';
        logs.forEach(log => {
          const row = `<tr>
            <td>${new Date(log.timestamp).toLocaleString('nl-NL')}</td>
            <td>${log.tracker_id}</td>
            <td>${log.ip}</td>
            <td>${log.country}</td>
            <td>${log.city}</td>
            <td>${log.browser} / ${log.os}</td>
          </tr>`;
          tbody.innerHTML += row;
        });
      });
  </script>
</body>
</html>
